services:
  postgres:
    image: postgres:16-alpine
    container_name: woojoowash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: woojoowash
      POSTGRES_PASSWORD: woojoowash_dev_pw
      POSTGRES_DB: woojoowash
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - woojoowash_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woojoowash -d woojoowash"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: woojoowash-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@woojoowash.kr
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - woojoowash_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: woojoowash-minio
    restart: unless-stopped
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: woojoowash
      MINIO_ROOT_PASSWORD: woojoowash_minio_pw
    ports:
      - "9100:9000"   # S3 API
      - "9101:9101"   # Web Console
    volumes:
      - woojoowash_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: woojoowash-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        /usr/bin/mc alias set local http://minio:9000 woojoowash woojoowash_minio_pw;
        /usr/bin/mc mb -p local/woojoowash-images || true;
        /usr/bin/mc anonymous set download local/woojoowash-images;
        echo 'minio bucket ready';
        exit 0;
      "
    restart: "no"

volumes:
  woojoowash_pg:
  woojoowash_pgadmin:
  woojoowash_minio:
