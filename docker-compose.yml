services:
  postgres:
    image: postgres:16-alpine
    container_name: woojoowash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: woojoowash
      POSTGRES_PASSWORD: woojoowash_dev_pw
      POSTGRES_DB: woojoowash
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - woojoowash_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woojoowash -d woojoowash"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: woojoowash-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@woojoowash.kr
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - woojoowash_pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  woojoowash_pg:
  woojoowash_pgadmin:
